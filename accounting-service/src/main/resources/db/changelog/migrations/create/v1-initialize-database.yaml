databaseChangeLog:
  - changeSet:
      id: 1
      author: ilya-tsimerman
      changes:
        - createTable:
            tableName: accounts
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: balance
                  type: NUMERIC(38,2)
                  constraints:
                    nullable: false