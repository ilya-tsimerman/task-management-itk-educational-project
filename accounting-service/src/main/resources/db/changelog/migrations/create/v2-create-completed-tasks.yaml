databaseChangeLog:
  - changeSet:
      id: create-completed-tasks
      author: ilya-tsimerman
      changes:

        - createTable:
            tableName: completed_tasks
            columns:
              - column:
                  name: id
                  type: BIGINT
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: assignee_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: reward_paid
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: completed_tasks
            baseColumnNames: assignee_id
            referencedTableName: accounts
            referencedColumnNames: id
            constraintName: fk_completed_tasks_account
            onDelete: RESTRICT
            onUpdate: CASCADE